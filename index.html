<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Night Shift — Brand-Ready TV Commercials</title>
<style>
  :root{--ink:#0B1420;--amber:#F0821E;--text:#EAF0F4;--muted:#aeb9c4}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--ink);color:var(--text)}

  .hero{position:relative;height:100svh;min-height:520px;overflow:hidden;background:#0B1420}
  /* background video */
  .hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  /* poster paints instantly, hidden once video is ready */
  .hero .poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;transition:opacity .6s ease}
  .hero.playing .poster{opacity:0}
  /* scrims for text legibility */
  .hero::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(180deg, rgba(11,20,32,.55) 0%, rgba(11,20,32,.10) 26%, rgba(11,20,32,.10) 55%, rgba(11,20,32,.80) 100%)}

  /* top bar */
  .topbar{position:absolute;top:0;left:0;right:0;z-index:3;display:flex;align-items:center;justify-content:space-between;
    padding:22px clamp(20px,5vw,54px)}
  .word{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:.02em;font-size:18px;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .moon{width:24px;height:24px;border-radius:50%;
    background:radial-gradient(circle at 34% 34%,#F5A24B,#F0821E 60%,transparent 62%);box-shadow:0 0 16px -1px #F0821E}
  .topbar .site{font-size:13px;color:var(--muted);text-decoration:none;letter-spacing:.04em}
  .topbar .site:hover{color:#fff}

  /* bottom content block */
  .content{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:0 clamp(20px,5vw,54px) clamp(30px,6vh,56px)}
  .eyebrow{font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);font-weight:700;margin-bottom:12px;text-shadow:0 2px 10px rgba(0,0,0,.6)}
  .content h1{font-size:clamp(28px,5.2vw,52px);line-height:1.05;letter-spacing:-.02em;max-width:16ch;text-wrap:balance;text-shadow:0 3px 20px rgba(0,0,0,.55)}
  .cta{display:inline-flex;align-items:center;gap:9px;margin-top:22px;background:var(--amber);color:#0B1420;font-weight:700;
    padding:13px 22px;border-radius:999px;text-decoration:none;font-size:15px;transition:transform .15s, box-shadow .15s;box-shadow:0 10px 30px -10px rgba(240,130,24,.7)}
  .cta:hover{transform:translateY(-2px);box-shadow:0 16px 36px -12px rgba(240,130,24,.85)}

  /* mute/sound toggle (optional, video starts muted) */
  .soundbtn{position:absolute;right:clamp(20px,5vw,54px);bottom:clamp(30px,6vh,56px);z-index:3;
    width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.35);background:rgba(11,20,32,.45);
    color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);font-size:16px}
  .soundbtn:hover{border-color:var(--amber)}

  @media (prefers-reduced-motion:reduce){ .hero video{display:none} }
</style>
</head>
<body>
  <section class="hero" id="hero">
    <img class="poster" src="pw-poster.jpg" alt="Pier Walk on Deerfield Beach — poolside at sunset">
    <video id="bg" poster="pw-poster.jpg" muted autoplay loop playsinline preload="metadata" aria-hidden="true">
      <source src="pw-hero-720.mp4" type="video/mp4">
    </video>

    <div class="topbar">
      <div class="word"><span class="moon"></span>The Night Shift</div>
      <span class="site">thenightshift.company</span>
    </div>

    <div class="content">
      <div class="eyebrow">Brand-Ready TV Commercials</div>
      <h1>Make your property impossible to forget.</h1>
      <a class="cta" href="https://claude.ai/code/artifact/8adbe554-99cc-4589-b053-008ca159e477" target="_blank" rel="noopener">See what we make &rarr;</a>
    </div>

    <button class="soundbtn" id="sound" aria-label="Toggle sound">&#128263;</button>
  </section>

  <script>
    (function(){
      var v=document.getElementById('bg'), hero=document.getElementById('hero'), btn=document.getElementById('sound');
      function playing(){ hero.classList.add('playing'); }
      v.addEventListener('playing', playing);
      if(v.readyState>=3) playing();
      // some mobile browsers need an explicit play() nudge
      var p=v.play(); if(p && p.catch){ p.catch(function(){}); }
      btn.addEventListener('click', function(){
        v.muted=!v.muted;
        btn.innerHTML = v.muted ? '🔇' : '🔊';
        if(v.paused) v.play();
      });
    })();
  </script>
</body>
</html>
